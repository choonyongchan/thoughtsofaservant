<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010c1a"/>
      <stop offset="70%" stop-color="#04111f"/>
      <stop offset="100%" stop-color="#071525"/>
    </linearGradient>
    <radialGradient id="aura-cyan" cx="22%" cy="32%" r="32%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura-red" cx="78%" cy="32%" r="32%">
      <stop offset="0%" stop-color="#e63946" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#e63946" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura-city" cx="50%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#0a2040" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#010c1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-big">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="blur-med">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="glow-c">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-r">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="hex" x="0" y="0" width="52" height="60" patternUnits="userSpaceOnUse">
      <polygon points="26,0 52,15 52,45 26,60 0,45 0,15" fill="none" stroke="#00a8cc" stroke-width="0.4"/>
    </pattern>
    <clipPath id="sky-clip">
      <rect x="0" y="0" width="1200" height="490"/>
    </clipPath>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#aura-cyan)"/>
  <rect width="1200" height="630" fill="url(#aura-red)"/>
  <rect width="1200" height="630" fill="url(#aura-city)"/>

  <!-- Hex grid overlay (sky only) -->
  <rect width="1200" height="490" fill="url(#hex)" opacity="0.09" clip-path="url(#sky-clip)"/>

  <!-- Stars -->
  <g fill="white">
    <circle cx="65"   cy="48"  r="1.2" opacity="0.7"/>
    <circle cx="145"  cy="22"  r="0.8" opacity="0.5"/>
    <circle cx="280"  cy="58"  r="1.0" opacity="0.6"/>
    <circle cx="420"  cy="35"  r="0.8" opacity="0.5"/>
    <circle cx="565"  cy="20"  r="1.2" opacity="0.4"/>
    <circle cx="695"  cy="55"  r="0.8" opacity="0.5"/>
    <circle cx="810"  cy="30"  r="1.0" opacity="0.6"/>
    <circle cx="935"  cy="48"  r="0.8" opacity="0.5"/>
    <circle cx="1060" cy="22"  r="1.2" opacity="0.7"/>
    <circle cx="1155" cy="55"  r="0.8" opacity="0.5"/>
    <circle cx="185"  cy="105" r="0.8" opacity="0.35"/>
    <circle cx="350"  cy="128" r="0.6" opacity="0.35"/>
    <circle cx="525"  cy="88"  r="0.8" opacity="0.35"/>
    <circle cx="660"  cy="112" r="0.6" opacity="0.35"/>
    <circle cx="880"  cy="95"  r="0.8" opacity="0.35"/>
    <circle cx="1020" cy="118" r="0.6" opacity="0.35"/>
  </g>

  <!-- OpenAI logo approximation (upper left, glowing cyan) -->
  <!-- Glow halos -->
  <circle cx="268" cy="188" r="115" fill="#00d4ff" opacity="0.025" filter="url(#blur-big)"/>
  <circle cx="268" cy="188" r="72"  fill="#00d4ff" opacity="0.055" filter="url(#blur-med)"/>
  <!-- Logo mark: 6 elliptical arms arranged radially, evoking the OpenAI circular knot -->
  <g transform="translate(268,188)" filter="url(#glow-c)">
    <ellipse cx="0" cy="-30" rx="13" ry="46" fill="#00d4ff" opacity="0.82" transform="rotate(0)"/>
    <ellipse cx="0" cy="-30" rx="13" ry="46" fill="#00d4ff" opacity="0.82" transform="rotate(60)"/>
    <ellipse cx="0" cy="-30" rx="13" ry="46" fill="#00d4ff" opacity="0.82" transform="rotate(120)"/>
    <ellipse cx="0" cy="-30" rx="13" ry="46" fill="#00d4ff" opacity="0.82" transform="rotate(180)"/>
    <ellipse cx="0" cy="-30" rx="13" ry="46" fill="#00d4ff" opacity="0.82" transform="rotate(240)"/>
    <ellipse cx="0" cy="-30" rx="13" ry="46" fill="#00d4ff" opacity="0.82" transform="rotate(300)"/>
    <!-- Central cutout (open centre of logo) -->
    <circle cx="0" cy="0" r="16" fill="#04111f"/>
    <!-- Outer ring outline -->
    <circle cx="0" cy="0" r="73" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.35"/>
  </g>

  <!-- Anthropic logo approximation (upper right, glowing red) -->
  <!-- Glow halos -->
  <circle cx="932" cy="188" r="115" fill="#e63946" opacity="0.02"  filter="url(#blur-big)"/>
  <circle cx="932" cy="188" r="72"  fill="#e63946" opacity="0.045" filter="url(#blur-med)"/>
  <!-- Logo mark: geometric triangular "A" form with inner detail -->
  <g transform="translate(932,188)" filter="url(#glow-r)">
    <!-- Outer equilateral triangle -->
    <path d="M 0,-73 L 63.2,36.5 L -63.2,36.5 Z"
          fill="none" stroke="#ff5a68" stroke-width="4" stroke-linejoin="round" opacity="0.9"/>
    <!-- Inner inverted triangle (hollow A interior) -->
    <path d="M 0,-22 L 28,28 L -28,28 Z"
          fill="none" stroke="#ff5a68" stroke-width="2.5" stroke-linejoin="round" opacity="0.55"/>
    <!-- Horizontal crossbar -->
    <line x1="-36" y1="8" x2="36" y2="8" stroke="#ff5a68" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <!-- Vertex accent dots -->
    <circle cx="0"    cy="-73" r="5" fill="#ff5a68" opacity="0.9"/>
    <circle cx="63.2" cy="36.5" r="4" fill="#ff5a68" opacity="0.7"/>
    <circle cx="-63.2" cy="36.5" r="4" fill="#ff5a68" opacity="0.7"/>
  </g>

  <!-- Circuit lines: logos → city -->
  <g fill="none">
    <!-- From OpenAI logo downward -->
    <polyline points="268,268 268,348 402,348 402,432"
              stroke="#00d4ff" stroke-width="1" stroke-dasharray="6,4" opacity="0.2"/>
    <circle cx="268" cy="348" r="3" fill="#00d4ff" opacity="0.35"/>
    <circle cx="402" cy="348" r="3" fill="#00d4ff" opacity="0.35"/>
    <!-- From Anthropic logo downward -->
    <polyline points="932,268 932,348 798,348 798,422"
              stroke="#e63946" stroke-width="1" stroke-dasharray="6,4" opacity="0.2"/>
    <circle cx="932" cy="348" r="3" fill="#e63946" opacity="0.35"/>
    <circle cx="798" cy="348" r="3" fill="#e63946" opacity="0.35"/>
    <!-- Horizontal background circuit traces -->
    <polyline points="0,372 118,372 118,392 238,392"
              stroke="#00d4ff" stroke-width="0.6" opacity="0.11"/>
    <circle cx="118" cy="372" r="2" fill="#00d4ff" opacity="0.18"/>
    <polyline points="1200,372 1082,372 1082,392 962,392"
              stroke="#00d4ff" stroke-width="0.6" opacity="0.11"/>
    <circle cx="1082" cy="372" r="2" fill="#00d4ff" opacity="0.18"/>
  </g>

  <!-- Digital rain (sparse vertical strips) -->
  <g fill="#00ff88" opacity="0.08">
    <rect x="148" y="95"  width="1" height="4"/>
    <rect x="148" y="106" width="1" height="6"/>
    <rect x="148" y="119" width="1" height="3"/>
    <rect x="148" y="129" width="1" height="5"/>
    <rect x="148" y="141" width="1" height="4"/>
    <rect x="148" y="152" width="1" height="3"/>
    <rect x="148" y="162" width="1" height="6"/>

    <rect x="1052" y="88"  width="1" height="5"/>
    <rect x="1052" y="100" width="1" height="4"/>
    <rect x="1052" y="111" width="1" height="6"/>
    <rect x="1052" y="124" width="1" height="3"/>
    <rect x="1052" y="134" width="1" height="5"/>
    <rect x="1052" y="146" width="1" height="4"/>
    <rect x="1052" y="157" width="1" height="3"/>

    <rect x="480" y="115" width="1" height="4"/>
    <rect x="480" y="126" width="1" height="5"/>
    <rect x="480" y="138" width="1" height="3"/>

    <rect x="720" y="120" width="1" height="5"/>
    <rect x="720" y="132" width="1" height="4"/>
    <rect x="720" y="143" width="1" height="6"/>
  </g>

  <!-- Singapore skyline silhouette -->
  <!-- Left cluster → Marina Bay Sands (center) → Right cluster -->
  <path d="
    M 0,630
    L 0,458
    L 55,458
    L 55,420
    L 85,420
    L 85,388
    L 115,388
    L 115,358
    L 145,358
    L 145,318
    L 175,318
    L 175,288
    L 208,288
    L 208,308
    L 238,308
    L 238,278
    L 268,278
    L 268,305
    L 298,305
    L 298,342
    L 328,342
    L 328,368
    L 358,368
    L 358,395
    L 390,395
    L 390,440
    L 418,440
    L 418,458
    L 455,458
    L 455,235
    L 503,235
    L 503,210
    L 533,210
    L 533,235
    L 545,235
    L 545,205
    L 575,205
    L 575,235
    L 587,235
    L 587,210
    L 617,210
    L 617,235
    L 668,235
    L 668,458
    L 705,458
    L 705,405
    L 738,405
    L 738,375
    L 768,375
    L 768,325
    L 800,325
    L 800,295
    L 832,295
    L 832,278
    L 862,278
    L 862,298
    L 892,298
    L 892,328
    L 922,328
    L 922,358
    L 952,358
    L 952,385
    L 982,385
    L 982,415
    L 1015,415
    L 1015,440
    L 1048,440
    L 1048,455
    L 1082,455
    L 1082,465
    L 1118,465
    L 1118,475
    L 1155,475
    L 1155,480
    L 1200,480
    L 1200,630
    Z
  " fill="#0c1e38"/>

  <!-- Water / ground plane -->
  <rect x="0" y="488" width="1200" height="142" fill="#050d18"/>

  <!-- Water horizon glow line -->
  <line x1="0" y1="488" x2="1200" y2="488" stroke="#00d4ff" stroke-width="0.8" opacity="0.28"/>

  <!-- Water ripple reflections -->
  <g stroke="#00d4ff" fill="none" opacity="0.055">
    <line x1="80"  y1="498" x2="420"  y2="498"/>
    <line x1="250" y1="508" x2="700"  y2="508"/>
    <line x1="450" y1="518" x2="850"  y2="518"/>
    <line x1="620" y1="528" x2="1100" y2="528"/>
    <line x1="300" y1="538" x2="900"  y2="538"/>
  </g>

  <!-- MBS SkyPark top edge glow -->
  <rect x="457" y="233" width="213" height="4" fill="#a0d8ef" opacity="0.1" filter="url(#blur-sm)"/>

  <!-- Building lit windows -->
  <!-- Left cluster - warm yellow -->
  <g fill="#ffe8a0" opacity="0.45">
    <rect x="147" y="296" width="4" height="3"/>
    <rect x="154" y="296" width="4" height="3"/>
    <rect x="161" y="296" width="4" height="3"/>
    <rect x="147" y="306" width="4" height="3"/>
    <rect x="161" y="306" width="4" height="3"/>
    <rect x="178" y="292" width="4" height="3"/>
    <rect x="185" y="292" width="4" height="3"/>
    <rect x="178" y="302" width="4" height="3"/>
    <rect x="185" y="302" width="4" height="3"/>
    <rect x="240" y="282" width="4" height="3"/>
    <rect x="248" y="282" width="4" height="3"/>
    <rect x="240" y="292" width="4" height="3"/>
  </g>
  <!-- MBS - cool blue-white -->
  <g fill="#c8e8ff" opacity="0.5">
    <rect x="508" y="215" width="4" height="3"/>
    <rect x="515" y="215" width="4" height="3"/>
    <rect x="508" y="223" width="4" height="3"/>
    <rect x="549" y="210" width="4" height="3"/>
    <rect x="556" y="210" width="4" height="3"/>
    <rect x="549" y="220" width="4" height="3"/>
    <rect x="591" y="215" width="4" height="3"/>
    <rect x="598" y="215" width="4" height="3"/>
    <rect x="591" y="223" width="4" height="3"/>
  </g>
  <!-- Right cluster - warm yellow -->
  <g fill="#ffe8a0" opacity="0.45">
    <rect x="803" y="298" width="4" height="3"/>
    <rect x="810" y="298" width="4" height="3"/>
    <rect x="803" y="308" width="4" height="3"/>
    <rect x="834" y="282" width="4" height="3"/>
    <rect x="841" y="282" width="4" height="3"/>
    <rect x="834" y="292" width="4" height="3"/>
    <rect x="841" y="292" width="4" height="3"/>
    <rect x="865" y="282" width="4" height="3"/>
    <rect x="872" y="282" width="4" height="3"/>
    <rect x="865" y="292" width="4" height="3"/>
  </g>

  <!-- Circuit overlay on buildings -->
  <g stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.15">
    <polyline points="178,322 232,322 232,292 265,292"/>
    <circle cx="232" cy="322" r="2.5" fill="#00d4ff" stroke="none"/>
    <polyline points="803,322 857,322 857,295 870,295"/>
    <circle cx="857" cy="322" r="2.5" fill="#00d4ff" stroke="none"/>
  </g>

  <!-- Subtle horizontal scan line -->
  <line x1="0" y1="418" x2="1200" y2="418"
        stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="10,6" opacity="0.045"/>
</svg>
