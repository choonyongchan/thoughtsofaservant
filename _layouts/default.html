<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description"
    content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 40 }}{% else %}{{ site.description }}{% endif %}">

  <!-- Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {% feed_meta %}
  {% seo %}

  {% include analytics.html %}

  {% if page.math %}
  <script>
    MathJax = { tex: { inlineMath: [['$','$']], displayMath: [['$$','$$']] } };
  </script>
  <script src="https://unpkg.com/mathjax@3.2.2/es5/tex-chtml.js"
          integrity="sha384-AHAnt9ZhGeHIrydA1Kp1L7FN+2UosbF7RQg6C+9Is/a7kDpQ1684C2iH2VWil6r4"
          crossorigin="anonymous" async></script>
  {% endif %}
</head>

<body{% if page.url == '/' %} class="home-page"{% endif %}>

  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>

</html>
